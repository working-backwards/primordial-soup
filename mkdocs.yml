site_name: Primordial Soup
site_description: >-
  A Monte Carlo simulation study of how governance regimes
  affect long-term organizational value creation.
site_url: https://working-backwards.github.io/primordial-soup/
repo_url: https://github.com/working-backwards/primordial-soup
repo_name: working-backwards/primordial-soup

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Study Overview: study_overview.md
  - Research Questions: research_questions.md
  - Study Briefs:
      - Academic: study/brief_wave.md
      - Business: study/brief_particle.md
  - Getting Started:
      - Quick Start: getting-started.md
      - Run Design Guide: guides/run_design_guide.md
      - Study Conductor Guide: guides/study_conductor_guide.md
  - Design Corpus:
      - Reading Order: design/index.md
      - Core Design Principles: design/canonical_core.md
      - Design Decisions: design/design_decisions.md
      - Initiative Model: design/initiative_model.md
      - Core Simulator: design/core_simulator.md
      - Governance: design/governance.md
      - Interfaces: design/interfaces.md
      - Team and Resources: design/team_and_resources.md
      - Sourcing and Generation: design/sourcing_and_generation.md
      - Architecture: design/architecture.md
      - Review and Reporting: design/review_and_reporting.md
      - Analysis and Experimentation: design/analysis_and_experimentation.md
      - Implementation Guidelines: design/implementation_guidelines.md
      - Engineering Standards: design/engineering_standards.md
      - Experiments: design/experiments.md
      - Environment Families: design/environment_families.md
      - State and Markov Property: design/state_definition_and_markov_property.md
      - Dynamic Opportunity Frontier: design/dynamic_opportunity_frontier.md
      - Diminishing Returns Deferral: design/diminishing_returns_deferral.md
      - Calibration Note: design/calibration_note.md
      - Generator Validity Memo: design/generator_validity_memo.md
      - Glossary: design/glossary.md
      - Future Directions: design/future_directions.md
  - Reference:
      - Naming Conventions: study/naming_conventions.md
      - Reporting Package Spec: implementation/reporting_package_specification.md
      - SimOpt Notes: implementation/simopt_notes.md
      - Calibration Plan: implementation/calibration_plan.md
      - Open Issues: implementation/open_implementation_issues.md
      - Post-Review Plan: implementation/post_expert_review_plan.md
